apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: saga
spec:
  selector:
    app: booking-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: saga
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: keerthanalp/booking-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGODB_URI
              value: "mongodb://host.docker.internal:27017"
            - name: MONGODB_DB
              value: "saga_db"
            - name: KAFKA_BROKER
              value: "host.docker.internal:9092"
            - name: KAFKA_CLIENT_ID
              value: "booking-service"
            - name: KAFKA_GROUP_ID
              value: "booking-group"