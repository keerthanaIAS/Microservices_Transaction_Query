apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: saga
  labels:
    app: booking-service
spec:
  selector:
    app: booking-service
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: saga
  labels:
    app: booking-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: YOUR_DOCKER_USERNAME/booking-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGODB_URI
              value: "mongodb://mongo-service:27017"
            - name: MONGODB_DB
              value: "saga_db"
            - name: KAFKA_BROKER
              value: "kafka-service:9092"
            - name: KAFKA_CLIENT_ID
              value: "booking-service"
            - name: KAFKA_GROUP_ID
              value: "booking-group"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/bookings
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/bookings
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 5